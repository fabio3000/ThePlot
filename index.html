<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>The Plot | Your life is a movie.</title>
    <link rel="icon" type="image/png" sizes="32x32" href="P.%20Logo.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="P.%20Logo.png?v=2">
    <link rel="apple-touch-icon" href="The%20Plot.%20Logo.png?v=2">
    <meta name="apple-mobile-web-app-title" content="The Plot.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.paypal.com/sdk/js?client-id=AboxAT2qskA0lY5-23Kj2tu_qY3bOK57rq_LbhtE_cdVOBT37fSHGacBKjgl-zx1XcJM9AZql96OCwc8&currency=EUR"></script>

    <style>
        /* --- BASIS & SCROLL-LOGIK --- */
        html, body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background-color: #09090b; color: #f4f4f5; 
            background-image: radial-gradient(circle at 50% 0%, #27272a 0%, #09090b 70%); 
            min-height: 100vh; width: 100vw; touch-action: pan-y; -webkit-text-size-adjust: 100%;
            overflow-x: hidden; overflow-y: auto;
        }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        /* --- VISUELLE EFFEKTE --- */
        .film-grain { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 50; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .gold-text { background: linear-gradient(to right, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .paper-texture { position: relative; }
        .paper-texture::after { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paperNoise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paperNoise)' opacity='0.08'/%3E%3C/svg%3E"); pointer-events: none; z-index: 10; mix-blend-mode: multiply; border-radius: inherit; }

        /* --- TICKET-SYSTEM --- */
        .ticket-wrapper { display: flex; perspective: 1000px; position: relative; gap: 2px; user-select: none; -webkit-user-select: none; margin: 20px auto; max-width: 95%; }
        .ticket-main { flex: 1; background: linear-gradient(135deg, #f4f4f5 0%, #e4e4e7 100%); border-radius: 16px 0 0 16px; padding: 32px; position: relative; box-shadow: -5px 10px 30px rgba(0,0,0,0.5); border-right: 3px dashed #9ca3af; transition: border-color 0.5s; overflow: hidden; }
        .ticket-stub { width: 80px; background: linear-gradient(135deg, #e4e4e7 0%, #d4d4d8 100%); border-radius: 0 16px 16px 0; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: grab; box-shadow: 5px 10px 30px rgba(0,0,0,0.5); transform-origin: top left; transition: transform 0.1s ease-out; touch-action: none; overflow: hidden; }
        .ticket-stub:active { cursor: grabbing; }
        .ticket-stub::before { content: ''; position: absolute; top: 0; right: 0; border-width: 0 45px 45px 0; border-style: solid; border-color: #09090b #09090b #ffffff #ffffff; border-radius: 0 16px 0 0; box-shadow: -3px 3px 8px rgba(0,0,0,0.3); z-index: 12; pointer-events: none; transition: border-width 0.2s ease; }
        .ticket-stub-text { writing-mode: vertical-rl; transform: rotate(180deg); color: #52525b; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; font-size: 14px; pointer-events: none; position: relative; z-index: 11; }
        .ticket-wrapper.torn .ticket-stub { transform: rotate(25deg) translateY(300px) translateX(50px) scale(0.9); opacity: 0; pointer-events: none; transition: transform 0.8s cubic-bezier(0.55, 0.085, 0.68, 0.53), opacity 0.6s ease; }
        .ticket-wrapper.torn .ticket-main { border-right-color: transparent; }
        .torn-edge { background-image: radial-gradient(circle at 5px 0, transparent 6px, #e4e4e7 7px); background-size: 16px 10px; background-repeat: repeat-x; height: 10px; width: 100%; position: absolute; top: -10px; left: 0; transform: rotate(180deg); }

        /* --- UI-ELEMENTE & TOASTS --- */
        .chat-scroll { overflow-y: auto !important; touch-action: pan-y !important; -webkit-overflow-scrolling: touch; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #52525b; border-radius: 10px; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { pointer-events: auto; background: rgba(24, 24, 27, 0.95); backdrop-filter: blur(8px); border: 1px solid #3f3f46; color: white; padding: 16px 24px; border-radius: 12px; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.success { border-left: 4px solid #10b981; }

        @keyframes breathe { 0% { transform: scale(1); opacity: 0.5; } 40% { transform: scale(1.5); opacity: 0.1; } 100% { transform: scale(1); opacity: 0.5; } }
        .animate-breathe { animation: breathe 8s infinite ease-in-out; }
        @keyframes pulse-gold { 0% { box-shadow: 0 0 5px rgba(217, 119, 6, 0.2); border-color: rgba(217, 119, 6, 0.3); } 50% { box-shadow: 0 0 20px rgba(217, 119, 6, 0.5); border-color: rgba(217, 119, 6, 0.8); } 100% { box-shadow: 0 0 5px rgba(217, 119, 6, 0.2); border-color: rgba(217, 119, 6, 0.3); } }
        .animate-pulse-gold { animation: pulse-gold 2s infinite ease-in-out; }
    </style>
</head>

<body class="flex flex-col relative">
    <div class="film-grain"></div>
    <div id="toast-container"></div>

    <div id="app" class="flex-1 flex flex-col pb-24 z-10 relative">
        <div class="text-center mt-40 flex flex-col items-center">
            <div class="w-16 h-16 border-t-2 border-l-2 border-amber-500 rounded-full animate-spin mb-6"></div>
            <div class="text-2xl serif italic text-zinc-400">Loading your scene...</div>
        </div>
    </div>

    <!-- Floating UI Elements -->
    <button id="floating-chat-btn" onclick="window.setView('chats')" class="fixed bottom-6 right-6 bg-zinc-800 border border-zinc-600 p-4 rounded-full shadow-2xl text-amber-500 hover:text-amber-400 hover:bg-zinc-700 transition z-40 hidden group">
        <svg class="w-6 h-6 group-hover:scale-110 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
    </button>
    <div id="dev-skip-btn" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 hidden pointer-events-auto">
        <button onclick="window.devSkipToLastQuest()" class="bg-red-900/80 text-red-200 border border-red-700/50 px-3 py-1 rounded-full text-[10px] uppercase tracking-widest font-bold shadow-lg hover:bg-red-800 transition">Dev: Finale (5s)</button>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // Phone Auth imports
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, signOut, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, onSnapshot, getDocs, getDoc, updateDoc, deleteDoc, query, where, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        let apiKey = "";
        try {
            const configModule = await import('./config.js');
            apiKey = configModule.PLOT_CONFIG.GEMINI_API_KEY;
        } catch(e) { console.warn("config.js nicht gefunden."); }

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };

        const CITIES = ["Köln", "Berlin", "Hamburg", "München"];
        const ADJECTIVES = ["Silent", "Midnight", "Ethereal", "Velvet", "Neon", "Wandering", "Electric", "Quiet", "Golden", "Crimson"];
        const NOUNS = ["Observer", "Thinker", "Dreamer", "Stranger", "Wanderer", "Muse", "Director", "Traveler", "Artist", "Shadow"];

        let appInit, auth, db;
        let countdownInterval;
        let isTransitioning = false; 
        let unsubs = []; 

        let state = { 
            user: null, view: 'loading', profile: null, currentDrop: null, allDrops: [],
            hasTicket: false, messages: [], authStep: 'phone', // phone | code
            showSettings: false, selectedCity: "Köln", tempPhone: '',
            privateChats: [], currentDropParticipants: null, openChatIsPrivate: false
        };

        window.showToast = (msg, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = `<svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            if(type === 'success') icon = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            if(type === 'error') icon = `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77-1.333.192 3 1.732 3z"></path></svg>`;
            toast.innerHTML = `${icon} <div><div class="font-bold text-xs uppercase tracking-widest text-zinc-400 mb-0.5">Notification</div><div>${msg}</div></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
        };

        async function generateUniqueAlias() {
            const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
            const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
            return `The ${adj} ${noun}`; 
        }

        // --- FIREBASE INITIALIZATION ---
        function clearListeners() {
            unsubs.forEach(u => u()); unsubs = [];
            if(window.unsubChat) { window.unsubChat(); window.unsubChat = null; }
            if(countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        }

        function initApp() {
            try {
                appInit = initializeApp(firebaseConfig);
                auth = getAuth(appInit);
                auth.useDeviceLanguage(); // Automatische SMS-Sprache
                db = getFirestore(appInit);
                
                onAuthStateChanged(auth, async (user) => {
                    state.user = user;
                    if (user) {
                        clearListeners();
                        const unsubProfile = onSnapshot(doc(db, 'plot_users', user.uid), async (docSnap) => {
                            if (docSnap.exists()) {
                                state.profile = docSnap.data();
                                state.selectedCity = state.profile.city || state.selectedCity;
                                if (state.view === 'loading' || state.view === 'auth') state.view = 'home'; 
                                checkRouting(); render(true);
                            } else {
                                // Neuer User per SMS (Auto-Generierung des Profils)
                                const newAlias = await generateUniqueAlias();
                                state.profile = { 
                                    hasPremium: false, tickets: [], completedDrops: [], 
                                    alias: newAlias, isAdmin: false, city: "Köln",
                                    extraTickets: 0, monthlyTicketsUsed: 0
                                };
                                await setDoc(doc(db, 'plot_users', user.uid), state.profile);
                                window.showToast(`Identität zugewiesen: ${newAlias}`, "success");
                                state.view = 'home'; render(true);
                            }
                        });
                        unsubs.push(unsubProfile);

                        const unsubDrops = onSnapshot(collection(db, 'plot_drops'), (snap) => {
                            state.allDrops = snap.docs.map(d => ({id: d.id, ...d.data()}));
                            const completed = state.profile?.completedDrops || [];
                            
                            state.currentDrop = state.allDrops.find(d => {
                                if (d.city !== state.selectedCity) return false;
                                const hasTicket = state.profile?.tickets?.some(t => typeof t === 'string' ? t === d.id : t.dropId === d.id);
                                if (hasTicket) return !completed.includes(d.id);
                                return d.isActive && d.phase === 'lobby' && !completed.includes(d.id);
                            }) || null;
                            
                            if(state.currentDrop) {
                                state.hasTicket = state.profile?.tickets?.some(t => typeof t === 'string' ? t === state.currentDrop.id : t.dropId === state.currentDrop.id) || false;
                            }
                            checkRouting(); render();
                        });
                        unsubs.push(unsubDrops);

                    } else {
                        clearListeners();
                        state.user = null; state.profile = null;
                        state.view = 'auth'; state.authStep = 'phone';
                        render(true);
                    }
                });
            } catch(error) { window.showToast("Systemfehler: " + error.message, "error"); }
        }
        initApp();

        // --- PHONE AUTHENTICATION ---
        window.sendSMS = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('auth_submit_btn');
            const phone = document.getElementById('auth_phone').value;
            state.tempPhone = phone;
            btn.disabled = true; btn.innerText = "Sende SMS...";

            try {
                if (!window.recaptchaVerifier) {
                    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                        'size': 'invisible'
                    });
                }
                window.confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
                state.authStep = 'code';
                window.showToast("SMS gesendet.", "success");
                render();
            } catch (err) {
                console.error(err);
                window.showToast("Fehler: " + err.message, "error");
                btn.disabled = false; btn.innerText = "SMS Code Senden";
                if (window.recaptchaVerifier) {
                    window.recaptchaVerifier.clear();
                    window.recaptchaVerifier = null;
                }
            }
        };

        window.verifyCode = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('verify_submit_btn');
            const code = document.getElementById('auth_code').value;
            btn.disabled = true; btn.innerText = "Prüfe...";

            try {
                await window.confirmationResult.confirm(code);
                // On success, Firebase onAuthStateChanged takes over!
            } catch (err) {
                window.showToast("Falscher oder abgelaufener Code.", "error");
                btn.disabled = false; btn.innerText = "Verifizieren";
            }
        };

        window.handleLogout = () => { state.showSettings = false; state.view = 'loading'; render(); signOut(auth); window.showToast("Logged out.", "info"); };
        
        function checkRouting() {
            const needsRouting = ['loading', 'auth', 'nodrop', 'home', 'ticket'].includes(state.view);
            if (needsRouting && state.profile) {
                if (!state.currentDrop) state.view = 'nodrop';
                else {
                    state.hasTicket = state.profile.tickets?.some(t => typeof t === 'string' ? t === state.currentDrop.id : t.dropId === state.currentDrop.id);
                    state.view = state.hasTicket ? 'ticket' : 'home';
                }
            }
        }
        window.setView = (view) => { state.view = view; state.showSettings = false; checkRouting(); render(true); };
        window.toggleSettings = () => { state.showSettings = !state.showSettings; render(); };
        window.changeCity = async (e) => { await setDoc(doc(db, 'plot_users', state.user.uid), { city: e.target.value }, { merge: true }); window.showToast(`City changed to ${e.target.value}`, "info"); };

        // --- RENDERER ---
        window.render = function render(force = false) {
            try {
                const appDiv = document.getElementById('app'); 
                if (state.view === 'loading' && state.profile) checkRouting();

                if (state.view === 'loading') {
                    appDiv.innerHTML = `<div class="text-center mt-40 flex flex-col items-center"><div class="w-16 h-16 border-t-2 border-l-2 border-amber-500 rounded-full animate-spin mb-6"></div><div class="text-2xl serif italic text-zinc-400">Loading your scene...</div></div>`;
                    return;
                }

                let html = `
                    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full z-20 pt-8">
                        <div class="text-2xl font-black tracking-tighter serif italic text-zinc-100 select-none">The Plot.</div>
                        <div class="text-xs uppercase tracking-widest text-zinc-500 font-semibold flex items-center gap-4">
                            ${state.user ? `<button onclick="window.toggleSettings()" class="hover:text-white transition pointer-events-auto bg-zinc-900 p-2 rounded-full border border-zinc-700"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>` : ''}
                        </div>
                    </nav>
                    <div class="max-w-lg mx-auto px-4 w-full flex-1 flex flex-col justify-center z-20">
                `;

                // --- AUTH VIEW (SMS) ---
                if (state.view === 'auth') {
                    html += `
                      <div class="text-center mb-10">
                        <h1 class="text-4xl serif italic mb-3">Real connections.</h1>
                        <p class="text-zinc-400 text-sm m-0 w-full mb-8">
                          Keine Bots. Keine Fake-Profile.<br>Nur echte Menschen im echten Leben.
                        </p>
                      </div>

                      <div id="recaptcha-container"></div>
                      
                      ${state.authStep === 'phone' ? `
                          <form onsubmit="window.sendSMS(event)" class="space-y-4">
                              <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold block ml-1">Handynummer</label>
                              <input id="auth_phone" type="tel" placeholder="+49 170 1234567" required value="${state.tempPhone}" class="w-full p-4 bg-zinc-900/50 border border-zinc-800 rounded-xl outline-none focus:border-amber-500/50 text-zinc-200 transition text-center text-xl tracking-widest">
                              <button id="auth_submit_btn" type="submit" class="w-full bg-zinc-100 text-zinc-900 hover:bg-white font-bold py-4 rounded-xl transition text-sm uppercase tracking-widest mt-4">
                                  SMS Code Senden
                              </button>
                          </form>
                      ` : `
                          <form onsubmit="window.verifyCode(event)" class="space-y-4 animate-fade-in">
                              <div class="text-center mb-6">
                                  <p class="text-zinc-400 text-sm">Der 6-stellige Code wurde gesendet an:<br><span class="text-amber-500 font-bold tracking-widest mt-2 block">${state.tempPhone}</span></p>
                              </div>
                              <input id="auth_code" type="text" placeholder="123456" required class="w-full p-4 bg-zinc-900/50 border border-zinc-800 rounded-xl outline-none focus:border-amber-500/50 text-zinc-200 transition text-center text-3xl font-mono tracking-[0.3em]">
                              <button id="verify_submit_btn" type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-xl transition text-sm uppercase tracking-widest mt-4">
                                  Verifizieren & Eintreten
                              </button>
                              <button type="button" onclick="state.authStep='phone'; window.render();" class="w-full text-center mt-4 text-xs text-zinc-500 hover:text-zinc-300 uppercase tracking-widest transition">Zahlendreher? Zurück</button>
                          </form>
                      `}
                    `;
                } 
                else if (state.view === 'home') {
                     html += `<div class="text-center mt-10"><h2 class="text-4xl serif italic mb-2">Dein Feed ist bereit.</h2></div>`;
                }
                else if (state.view === 'nodrop') {
                     html += `<div class="text-center"><h1 class="text-3xl serif italic mb-3">Keine Szenen in ${state.selectedCity}.</h1><p class="text-zinc-500 text-sm">Die Regie plant gerade.</p></div>`;
                }

                html += `</div>`;

                if (state.showSettings) {
                    html += `
                        <div class="fixed inset-0 bg-zinc-950/90 z-[9999] p-6 flex flex-col justify-center animate-fade-in pointer-events-auto">
                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-8 max-w-sm w-full mx-auto shadow-2xl relative">
                                <div class="flex justify-between items-center mb-6"><h2 class="text-2xl serif italic">Settings</h2><button onclick="window.toggleSettings()" class="text-zinc-500 hover:text-white transition">✕</button></div>
                                <div class="space-y-4">
                                    <div><label class="text-xs uppercase tracking-widest text-zinc-500 font-bold block mb-2">Location</label><select onchange="window.changeCity(event)" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded-xl text-sm outline-none focus:border-amber-500 transition">${CITIES.map(c => `<option value="${c}" ${state.selectedCity === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
                                    <div class="p-4 bg-amber-900/10 border border-amber-500/20 rounded-xl">
                                        <div class="text-[10px] uppercase tracking-widest text-amber-500 font-bold mb-1">Your Alias</div>
                                        <div class="font-serif italic text-lg text-zinc-200">${state.profile?.alias || 'The Stranger'}</div>
                                    </div>
                                </div>
                                <div class="mt-8 space-y-1 border-t border-zinc-800 pt-4"><button onclick="window.handleLogout()" class="w-full text-left p-2 text-[10px] uppercase tracking-widest text-zinc-500 hover:text-zinc-100 transition">Ausloggen</button></div>
                            </div>
                        </div>
                    `;
                }
                appDiv.innerHTML = html;
            } catch (err) { console.error(err); }
        };
        window.render = render;
    </script>
</body>
</html>
